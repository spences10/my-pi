scout-plan:
  description: 'Scout the codebase then plan implementation'
  steps:
    - agent: scout
      prompt: 'Explore and analyze: $INPUT'
    - agent: planner
      prompt: "Based on this analysis, create a plan:\n\n$INPUT"

scout-plan-review:
  description: 'Scout, plan, then review the plan'
  steps:
    - agent: scout
      prompt: 'Explore and analyze: $INPUT'
    - agent: planner
      prompt: "Based on this analysis, create a plan:\n\n$INPUT"
    - agent: reviewer
      prompt:
        "Review this plan for gaps and risks:\n\n$INPUT\n\nOriginal
        request: $ORIGINAL"
